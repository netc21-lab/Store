<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahorra | Ya</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Moda<span>Vibe</span></div>
        <div class="nav-icons">
            <button id="admin-btn" class="icon-btn">⚙️ Acceso Admin</button>
            <div class="cart-icon" id="cart-btn">
                🛒 <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Estilo Exclusivo <mark>2026</mark></h1>
            <p>Tu tienda de confianza con pedidos directos por WhatsApp.</p>
        </div>
    </header>

    <main class="container">
        <section class="controls">
            <input type="text" id="search-input" placeholder="¿Qué estás buscando hoy?">
            <select id="category-filter">
                <option value="all">Todo</option>
                <option value="Ropa">Ropa</option>
                <option value="Accesorios">Accesorios</option>
            </select>
        </section>

        <section id="product-grid" class="product-grid">
            <!-- Productos aquí -->
        </section>
    </main>

    <!-- Modal Carrito -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('cart-modal')">&times;</span>
            <h2>Mi Carrito</h2>
            <div id="cart-items" class="cart-items"></div>
            <div class="cart-summary">
                <div class="summary-line"><span>Subtotal:</span> <span>S/ <span id="subtotal">0.00</span></span></div>
                <div class="summary-line"><span>Envío:</span> <span>S/ <span id="delivery-cost">0.00</span></span></div>
                <div class="summary-line total"><span>Total:</span> <span>S/ <span id="total-price">0.00</span></span></div>
            </div>
            <div class="checkout-form">
                <input type="text" id="client-name" placeholder="Nombre completo">
                <input type="text" id="client-address" placeholder="Dirección de entrega">
                <div class="yape-box">
                    <p>Paga con <strong>Yape</strong> al:</p>
                    <p class="yape-number">987 654 321</p>
                </div>
                <button id="btn-whatsapp" class="btn-whatsapp">Enviar Pedido por WhatsApp</button>
            </div>
        </div>
    </div>

    <!-- Modal Admin (Protegido) -->
    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('admin-modal')">&times;</span>
            <h2>Panel de Control (Privado)</h2>
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">Solo tú puedes ver los costos y ganancias.</p>
            
            <form id="product-form" class="admin-form">
                <input type="text" id="p-name" placeholder="Nombre del producto" required>
                <input type="text" id="p-img" placeholder="URL de imagen">
                <div class="form-row">
                    <input type="number" id="p-price" placeholder="Precio Venta S/" step="0.1" required>
                    <input type="number" id="p-cost" placeholder="Costo Real S/" step="0.1" required>
                </div>
                <div class="form-row">
                    <input type="number" id="p-stock" placeholder="Stock" required>
                    <select id="p-category">
                        <option value="Ropa">Ropa</option>
                        <option value="Accesorios">Accesorios</option>
                    </select>
                </div>
                <button type="submit" class="btn-save">Agregar al Inventario</button>
            </form>

            <div id="admin-list" class="admin-list">
                <!-- Solo visible tras login -->
            </div>
            <button onclick="logoutAdmin()" class="btn-logout">Cerrar Sesión Admin</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
